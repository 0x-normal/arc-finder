<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find ARC — Word Hunt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-overlay: rgba(8, 12, 24, 0.55);
            --surface: rgba(255, 255, 255, 0.08);
            --surface-strong: rgba(255, 255, 255, 0.14);
            --border: rgba(255, 255, 255, 0.18);
            --text: #f5f7fb;
            --muted: rgba(245, 247, 251, 0.72);
            --accent: #7c5cff;
            --accent-2: #23d1c4;
            --accent-3: #ff7ab6;
            --success: #34d399;
            --danger: #f87171;
            --radius-lg: 20px;
            --radius-md: 14px;
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.35);
            --shadow-sm: 0 4px 14px rgba(0, 0, 0, 0.25);
        }

        * { box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            margin: 0;
            padding: 24px 16px 96px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            font-family: 'Poppins', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            color: var(--text);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle animated vignette over the background video */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(1200px 600px at 10% 10%, rgba(124, 92, 255, 0.25), transparent 60%),
                radial-gradient(900px 500px at 90% 20%, rgba(35, 209, 196, 0.22), transparent 60%),
                radial-gradient(800px 500px at 50% 100%, rgba(255, 122, 182, 0.18), transparent 60%),
                linear-gradient(180deg, rgba(5, 8, 20, 0.65), rgba(5, 8, 20, 0.75));
            z-index: -1;
            pointer-events: none;
        }

        #background-video {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
            filter: saturate(1.05) brightness(0.75);
        }

        /* Credits */
        .credits {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 999px;
            font-size: clamp(11px, 2.4vw, 13px);
            text-align: center;
            z-index: 5;
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .credits a { color: #fff; text-decoration: none; border-bottom: 1px dashed rgba(255,255,255,0.5); }
        .credits a:hover { border-bottom-style: solid; }

        /* Instructions / Welcome */
        #instructions-section {
            max-width: 520px;
            width: 100%;
            margin: 8vh auto 0;
            padding: 40px 28px;
            text-align: center;
            border-radius: var(--radius-lg);
            background: var(--surface);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            animation: popIn 0.5s ease-out both;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 6px 14px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(124,92,255,0.25), rgba(35,209,196,0.25));
            border: 1px solid var(--border);
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
            color: #fff;
            margin-bottom: 14px;
        }
        .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-2); box-shadow: 0 0 12px var(--accent-2); }

        #instructions-section h2 {
            margin: 6px 0 10px;
            font-size: clamp(28px, 5vw, 40px);
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #b8a9ff 50%, #7ff0e4 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        #instructions-section p {
            color: var(--muted);
            font-size: 16px;
            line-height: 1.6;
            margin: 0 0 28px;
        }
        #instructions-section p strong { color: #fff; font-weight: 700; }

        .btn {
            font-family: inherit;
            font-weight: 700;
            border-radius: 999px;
            cursor: pointer;
            border: none;
            transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }
        .btn:active { transform: translateY(1px) scale(0.99); }

        #start-button {
            padding: 14px 32px;
            font-size: 17px;
            color: #0b0d1a;
            background: linear-gradient(135deg, #fff, #d9d1ff 60%, #9ef0e6);
            box-shadow: 0 10px 30px rgba(124, 92, 255, 0.35), inset 0 0 0 1px rgba(255,255,255,0.6);
        }
        #start-button:hover { filter: brightness(1.05); box-shadow: 0 14px 40px rgba(124, 92, 255, 0.5); }

        /* Game layout */
        #game-wrapper { width: 100%; display: flex; justify-content: center; }

        #game-section {
            display: none;
            width: 100%;
            max-width: 760px;
            animation: fadeUp 0.4s ease-out both;
        }

        .game-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 22px;
            border-radius: var(--radius-lg);
            background: var(--surface);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            position: relative;
        }

        /* HUD */
        #score-sign-container {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .score-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            min-width: 130px;
            padding: 10px 18px;
            border-radius: var(--radius-md);
            background: var(--surface-strong);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
        }
        .score-box span { font-family: 'JetBrains Mono', monospace; font-size: 22px; color: #fff; letter-spacing: 0; }

        /* Target word highlight */
        .target-word {
            display: flex; gap: 6px; margin-bottom: 14px;
        }
        .target-word span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px; height: 28px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #0b0d1a;
            font-weight: 800;
            font-size: 14px;
            box-shadow: 0 6px 16px rgba(124,92,255,0.35);
        }

        /* Grid */
        #grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 5px;
            padding: 14px;
            border-radius: var(--radius-md);
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 640px;
            touch-action: none; /* prevent scroll while dragging on mobile */
        }

        .letter {
            aspect-ratio: 1 / 1;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(8px, 1.6vw, 13px);
            font-weight: 700;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            color: #111424;
            transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
            cursor: pointer;
        }
        .letter:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.25); }

        .letter.selected {
            background: linear-gradient(135deg, var(--accent), var(--accent-3));
            color: #fff;
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(124, 92, 255, 0.45);
        }
        .letter.success {
            background: linear-gradient(135deg, #34d399, #10b981) !important;
            color: #04120c !important;
            animation: pop 0.4s ease;
        }
        .letter.empty { background: transparent; box-shadow: none; pointer-events: none; }

        /* Timer — always horizontal, lives in normal flow above the grid */
        #vertical-timer {
            position: relative;
            width: 100%;
            max-width: 640px;
            height: 12px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 999px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin: 0 0 10px;
        }
        #timer-fill {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: var(--pct, 100%);
            background: linear-gradient(90deg, #34d399, #7c5cff 70%, #ff7ab6);
            border-radius: 999px;
            transition: width 0.3s linear, background 0.3s ease;
        }
        #timer-fill.low { background: linear-gradient(90deg, #f59e0b, #ef4444); }
        #timer-label {
            display: inline-block;
            margin-bottom: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 12px;
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            padding: 3px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            white-space: nowrap;
        }

        /* Play again / result modal */
        #play-again {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(12, 16, 30, 0.8);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            padding: 34px 30px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 50;
            min-width: 300px;
            animation: popIn 0.35s ease-out both;
        }
        #play-again .result-icon { font-size: 44px; margin-bottom: 6px; }
        #play-again .message {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 6px;
            color: #fff;
        }
        #play-again .sub {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 20px;
        }
        #play-again .button-text {
            padding: 12px 28px;
            font-size: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #fff;
            box-shadow: 0 10px 28px rgba(124,92,255,0.45);
        }
        #play-again .button-text:hover { filter: brightness(1.08); }

        /* Floating point notifications */
        .float-point {
            position: fixed;
            pointer-events: none;
            font-weight: 800;
            font-size: 20px;
            color: #34d399;
            text-shadow: 0 2px 10px rgba(52,211,153,0.6);
            animation: floatUp 0.9s ease-out forwards;
            z-index: 40;
        }

        /* Mode message toast */
        #mode-message {
            display: none;
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            background: rgba(12, 16, 30, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 999px;
            z-index: 60;
            box-shadow: var(--shadow-sm);
        }

        /* Music toggle */
        #music-toggle {
            position: fixed;
            bottom: 16px;
            right: 16px;
            padding: 10px 16px;
            background: var(--surface);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            border-radius: 999px;
            cursor: pointer;
            z-index: 10;
            transition: background 0.2s ease;
        }
        #music-toggle:hover { background: var(--surface-strong); }

        /* Animations */
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.25); } 100% { transform: scale(1); } }
        @keyframes popIn { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        #instructions-section { animation-name: fadeUp; }
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(14px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-60px) scale(1.2); } }

        /* Responsive — NOTE: grid stays at 20 columns at every breakpoint
           because the word-placement logic in JS assumes a 20×20 layout. */
        @media (max-width: 820px) {
            .game-container { padding: 16px; }
        }
        @media (max-width: 640px) {
            body { padding: 14px 10px 120px; }
            #instructions-section { margin-top: 4vh; padding: 28px 20px; }
            #instructions-section h2 { font-size: 28px; }
            #instructions-section p { font-size: 14px; }
            .target-word span { width: 24px; height: 24px; font-size: 13px; }
            .game-container { padding: 12px; }
            #grid { gap: 3px; padding: 6px; border-radius: 10px; }
            .letter { border-radius: 4px; font-size: clamp(7px, 2.2vw, 11px); }
            #score-sign-container { gap: 8px; margin-bottom: 14px; }
            .score-box { min-width: 0; flex: 1; padding: 8px 10px; font-size: 10px; letter-spacing: 1px; }
            .score-box span { font-size: 18px; }
            #play-again { min-width: 0; width: calc(100% - 32px); max-width: 360px; padding: 26px 20px; }
            #play-again .message { font-size: 19px; }
            #music-toggle { padding: 8px 12px; font-size: 12px; bottom: 12px; right: 12px; }
            .credits { bottom: 58px; padding: 6px 12px; }
        }
        @media (max-width: 380px) {
            #grid { gap: 2px; padding: 4px; }
            .letter { font-size: 8px; }
            #instructions-section h2 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div id="instructions-section">
        <div class="brand"><span class="dot"></span> Word Hunt</div>
        <h2>Find ARC</h2>
        <p>Drag across the grid to spell <strong>A&nbsp;R&nbsp;C</strong> — horizontally or vertically. Find them all before the timer runs out.</p>
        <div class="target-word" style="justify-content:center;"><span>A</span><span>R</span><span>C</span></div>
        <div style="height:18px"></div>
        <button id="start-button" class="btn">Start Game</button>
    </div>
    <div id="game-wrapper">
        <div id="game-section">
            <div class="game-container">
                <div class="target-word" aria-hidden="true"><span>A</span><span>R</span><span>C</span></div>
                <div id="score-sign-container">
                    <div id="score" class="score-box">Score<span>0</span></div>
                    <div id="sign-count" class="score-box">Remaining<span id="total-signs">0</span></div>
                </div>
                <div id="timer-label">40s</div>
                <div id="vertical-timer"><div id="timer-fill"></div></div>
                <div id="grid"></div>
            </div>
        </div>
    </div>
    <div id="play-again">
        <div class="result-icon">🎉</div>
        <div class="message"></div>
        <div class="sub"></div>
        <button class="button-text btn">Play Again</button>
    </div>
    <div class="credits">Made with 🤍 by <a href="https://x.com/heyfrens1" target="_blank" rel="noopener">adam</a></div>
<audio id="correct-sound" src="correct.mp3" preload="auto"></audio>
<audio id="bg-music" src="music.mp3" loop preload="auto"></audio>

<button id="music-toggle" aria-label="Toggle music">🔊 Music On</button>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const grid = document.getElementById("grid");
        const scoreElement = document.querySelector("#score span");
        const timerElement = document.getElementById("timer");
        const signCountElement = document.getElementById("total-signs");
        const playAgainButton = document.getElementById("play-again");
        const instructionsSection = document.getElementById("instructions-section");
        const gameSection = document.getElementById("game-section");
        const startButton = document.getElementById("start-button");
        const targetWord = "ARC";
        let currentSelection = "";
        let score = 0;
        const gridSize = 400;
        let targetWordCount = Math.floor(Math.random() * (15 - 10 + 1)) + 10;
        let timeLeft = 40;
        let foundWords = 0;
        let gameActive = true;
        let timerInterval;

        const modeMessage = document.getElementById("mode-message");
        startButton.addEventListener("click", () => {
        instructionsSection.style.display = "none"; // Hide instructions
        gameSection.style.display = "block";       // Show game section
        startGame();                               // Start the game
    });
        // Function to generate a grid with embedded target words
        function generateGridLetters(targetWord, count, gridSize) {
            const gridLetters = Array(gridSize).fill(null);
            const rows = Math.sqrt(gridSize);
            let placedWords = 0;
            const maxAttempts = 1000;

            while (placedWords < count && maxAttempts > 0) {
                const isHorizontal = Math.random() > 0.5;
                const wordLength = targetWord.length;
                let startIndex;
                let canPlace = true;

                if (isHorizontal) {
                    const rowIndex = Math.floor(Math.random() * rows);
                    const colIndex = Math.floor(Math.random() * (rows - wordLength + 1));
                    startIndex = rowIndex * rows + colIndex;

                    for (let i = 0; i < wordLength; i++) {
                        if (gridLetters[startIndex + i] !== null) {
                            canPlace = false;
                            break;
                        }
                    }

                    if (canPlace) {
                        for (let i = 0; i < wordLength; i++) {
                            gridLetters[startIndex + i] = targetWord[i];
                        }
                        placedWords++;
                    }
                } else {
                    const colIndex = Math.floor(Math.random() * rows);
                    const rowIndex = Math.floor(Math.random() * (rows - wordLength + 1));
                    startIndex = rowIndex * rows + colIndex;

                    for (let i = 0; i < wordLength; i++) {
                        if (gridLetters[startIndex + i * rows] !== null) {
                            canPlace = false;
                            break;
                        }
                    }

                    if (canPlace) {
                        for (let i = 0; i < wordLength; i++) {
                            gridLetters[startIndex + i * rows] = targetWord[i];
                        }
                        placedWords++;
                    }
                }
            }

            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for (let i = 0; i < gridSize; i++) {
                if (!gridLetters[i]) {
                    gridLetters[i] = alphabet[Math.floor(Math.random() * alphabet.length)];
                }
            }

            return gridLetters;
        }

        function startGame() {
            gameActive = true;
            timeLeft = 40;
            foundWords = 0;
            score = 0;

            scoreElement.textContent = score;
            updateTimerDisplay();
            playAgainButton.style.display = "none";
            currentSelection = "";

            grid.innerHTML = "";

            const lettersGrid = generateGridLetters(targetWord, targetWordCount, gridSize);
            signCountElement.textContent = targetWordCount;

            for (let i = 0; i < lettersGrid.length; i++) {
                const letterDiv = document.createElement("div");
                letterDiv.classList.add("letter");
                letterDiv.textContent = lettersGrid[i];
                letterDiv.dataset.index = i;
                letterDiv.addEventListener("mousedown", startDrag);
                letterDiv.addEventListener("mouseover", continueDrag);
                grid.appendChild(letterDiv);
            }

            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        let dragging = false;
        function startDrag(e) {
            if (!gameActive) return;
            dragging = true;
            resetSelection();
            selectLetter(e.target);
        }

        function continueDrag(e) {
            if (!gameActive) return;
            if (dragging) {
                selectLetter(e.target);
            }
        }

        document.addEventListener("mouseup", () => {
            if (!gameActive) return;
            if (dragging) {
                dragging = false;
                checkWord();
            }
        });

        function selectLetter(letterDiv) {
            if (!gameActive) return;
            if (letterDiv.classList.contains("letter") && !letterDiv.classList.contains("selected")) {
                letterDiv.classList.add("selected");
                currentSelection += letterDiv.textContent;
            }
        }

        function checkWord() {
            if (!gameActive) return;

            if (currentSelection === targetWord) {
            document.getElementById("correct-sound").play();
                score++;
                scoreElement.textContent = score;
                highlightSuccess();
                removeSelectedLetters();
                foundWords++;
                signCountElement.textContent = targetWordCount - foundWords;

                if (foundWords === targetWordCount) {
                    winGame();
                }
            } else {
                resetSelection();
            }
            currentSelection = "";
        }

        function highlightSuccess() {
            document.querySelectorAll(".selected").forEach((el) => {
                el.classList.add("success");
            });
            const last = document.querySelectorAll(".selected");
            if (last.length) {
                const rect = last[last.length - 1].getBoundingClientRect();
                spawnFloatingPoint(rect.left + rect.width / 2, rect.top, "+1");
            }
        }

        function spawnFloatingPoint(x, y, text) {
            const el = document.createElement("div");
            el.className = "float-point";
            el.textContent = text;
            el.style.left = x + "px";
            el.style.top = y + "px";
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 900);
        }

        function removeSelectedLetters() {
            document.querySelectorAll(".success, .selected").forEach((el) => {
                el.textContent = "";
                el.classList.remove("letter", "selected", "success");
                el.classList.add("empty");
            });
        }

        function resetSelection() {
            document.querySelectorAll(".selected").forEach((el) => {
                el.classList.remove("selected");
            });
            currentSelection = "";
        }

        function updateTimer() {
            if (!gameActive) return;

            timeLeft--;
            updateTimerDisplay();


            if (timeLeft <= 0) {
                loseGame();
            }
        }
        function updateTimerDisplay() {
            const fill = document.getElementById("timer-fill");
            const label = document.getElementById("timer-label");
            const pct = Math.max(0, (timeLeft / 40) * 100);
            fill.style.setProperty("--pct", pct + "%");
            label.textContent = `${timeLeft}s`;
            fill.classList.toggle("low", timeLeft <= 10);
        }

        function winGame() {

// Touch drag support for mobile
(function setupTouchDrag() {
    const gridEl = document.getElementById("grid");
    if (!gridEl) return;

    gridEl.addEventListener("touchstart", (e) => {
        const touch = e.touches[0];
        if (!touch) return;
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        if (el && el.classList && el.classList.contains("letter")) {
            e.preventDefault();
            el.dispatchEvent(new MouseEvent("mousedown", { bubbles: true }));
        }
    }, { passive: false });

    gridEl.addEventListener("touchmove", (e) => {
        const touch = e.touches[0];
        if (!touch) return;
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        if (el && el.classList && el.classList.contains("letter")) {
            e.preventDefault();
            el.dispatchEvent(new MouseEvent("mouseover", { bubbles: true }));
        }
    }, { passive: false });

    gridEl.addEventListener("touchend", () => {
        document.dispatchEvent(new MouseEvent("mouseup", { bubbles: true }));
    });
    gridEl.addEventListener("touchcancel", () => {
        document.dispatchEvent(new MouseEvent("mouseup", { bubbles: true }));
    });
})();
